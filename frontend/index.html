<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/book.png" type="image/icon type">
  <title>Recipe Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
  <img class="bg-image"  src="img/IMG_3679.jpg"/>
  <a href="faq.html" class="faq-button">
    <i class="fas fa-question-circle"></i> FAQ
  </a>
  <h1 class="main-h1">Recipe Finder</h1>
  <div class="container">
    <div class="input-wrapper">
      <label for="input">Enter ingredients:</label>
      <input type="text" id="input" placeholder="Tomatoes, Chicken Breast, Garlic">
    </div>
    <button onclick="fetchData()">
      <i class="fas fa-search"></i> Search
    </button>
    
    <div id="spinner" class="spinner" style="display: none;"></div> <!-- Spinner element -->
    <div id="results"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
